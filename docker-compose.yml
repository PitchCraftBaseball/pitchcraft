services:
  web:
    image: ghcr.io/pitchcraftbaseball/pitchcraft-web:${IMAGE_TAG}
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MODEL_BASE_URL=${MODEL_BASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  nginx:
    image: ghcr.io/pitchcraftbaseball/pitchcraft-nginx:${IMAGE_TAG}
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
