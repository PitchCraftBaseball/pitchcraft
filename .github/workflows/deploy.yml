name: Build images & deploy

on:
  push:
    branches: ["main"]

env:
  OWNER: pitchcraftbaseball
  REGISTRY: ghcr.io

jobs:

  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pitchcraft-webserver/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pitchcraft-webserver/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pre-pull Postgres image
        run: docker pull postgres:16-alpine

      - name: Run Vitest suite
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Upload Vitest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: pitchcraft-webserver/backend/test-results/
          retention-days: 14

  playwright:
    runs-on: ubuntu-latest
    needs: vitest
    defaults:
      run:
        working-directory: ./pitchcraft-webserver/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pitchcraft-webserver/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: pitchcraft-webserver/frontend/playwright-report/
          retention-days: 14

  build-and-push:
    runs-on: ubuntu-latest
    needs: [vitest, playwright]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push pitchcraft backend (web)
        uses: docker/build-push-action@v6
        with:
          context: ./pitchcraft-webserver
          file: ./pitchcraft-webserver/backend/Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER }}/pitchcraft-web:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/pitchcraft-web:latest

      - name: Build & push pitchcraft frontend (nginx)
        uses: docker/build-push-action@v6
        with:
          context: ./pitchcraft-webserver
          file: ./pitchcraft-webserver/frontend/Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER }}/pitchcraft-nginx:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/pitchcraft-nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Upload compose & nginx.conf to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: /opt/pitchcraft
          strip_components: 0

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/pitchcraft
            cd /opt/pitchcraft
            echo "IMAGE_TAG=${{ github.sha }}" > .env.runtime
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.runtime
            MODEL_BASE_URL="${{ secrets.MODEL_BASE_URL }}"
            if [ -n "$MODEL_BASE_URL" ]; then
              echo "MODEL_BASE_URL=$MODEL_BASE_URL" >> .env.runtime
            fi
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            DC="docker compose"
            if command -v docker-compose >/dev/null 2>&1; then DC="docker-compose"; fi
            $DC --env-file .env.runtime pull
            $DC --env-file .env.runtime up -d --remove-orphans
            docker image prune -f
