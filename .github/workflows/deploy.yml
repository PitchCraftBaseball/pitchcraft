name: Build images & deploy

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  OWNER: pitchcraftbaseball
  REPO: pitchcraft

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (Node)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}-web:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}-web:latest

      - name: Build & push frontend (Nginx)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}-nginx:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/${{ env.REPO }}-nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Upload compose & nginx.conf to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: deploy
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: /opt/app
          strip_components: 0

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: deploy
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/app
            cd /opt/app
            echo "IMAGE_TAG=${{ github.sha }}" > .env.runtime
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.runtime
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker-compose --env-file .env.runtime pull
            docker-compose --env-file .env.runtime up -d --remove-orphans
            docker image prune -f
